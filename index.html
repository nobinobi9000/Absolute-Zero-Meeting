<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ねこのおじさん絶対零度会議室</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ねこのおじさん絶対零度会議室</h1>
    <div id="cat-area">
        <img id="cat-img" src="images/cat1.png" alt="猫のおじさん">
        <div id="message-box">会議を始めるぞ。<br>時間を設定してくれ。</div>
    </div>

    <div class="timer-display" id="timer">00:00</div>
    <div class="controls">
        <button onclick="startTimer()">スタート</button>
        <button onclick="resetTimer()">リセット</button>
    </div>
    <div class="time-settings">
        <button onclick="addTime(1)">+1分</button>
        <button onclick="addTime(5)">+5分</button>
        <button onclick="addTime(10)">+10分</button>
        <button onclick="addTime(30)">+30分</button>
        <button onclick="addTime(60)">+60分</button>
    </div>
    <br>
    <button onclick="speakRandom()">本日の終わりの一言</button>

    <div id="result-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; text-align:center;">
        <div style="margin-top: 50px; color: white;">
            <img id="modal-cat-img" src="images/cat1.png" style="width: 300px; border-radius: 10px;">
            <div id="modal-message" style="font-size: 1.5em; padding: 20px;"></div>
            <button onclick="closeModal()" style="padding: 10px 20px;">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
