<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>猫のおじさんの会議締めツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cat-area">
        <img id="cat-img" src="images/cat1.jpg" alt="猫のおじさん">
        <div id="message-box">会議を始めるぞ。時間を設定してくれ。</div>
    </div>

    <div class="timer-display" id="timer">00:00</div>
    <div>
        <button onclick="addTime(1)">+1分</button>
        <button onclick="addTime(5)">+5分</button>
        <button onclick="addTime(10)">+10分</button>
        <button onclick="addTime(30)">+30分</button>
        <button onclick="addTime(60)">+60分</button>
    </div>
    <br>
    <button onclick="speakRandom()">本日の終わりの一言</button>

    <script src="script.js"></script>
</body>
</html>
